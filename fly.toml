app = "fi-tracker-familieidraet"
primary_region = "arn"

[build]

[env]
  DATABASE_URL = "/data/fi_tracker.db"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0

[[vm]]
  memory = "256mb"
  cpu_kind = "shared"
  cpus = 1

[mounts]
  source = "fi_tracker_data"
  destination = "/data"
