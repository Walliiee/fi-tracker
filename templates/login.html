<!DOCTYPE html>
<html lang="da">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — fi-tracker</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/style.css">
  <style>
    body { display: flex; align-items: center; justify-content: center; height: 100vh; background: var(--bg); }
    .login-box { background: var(--panel); padding: 40px; border-radius: 8px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); width: 100%; max-width: 360px; border: 1px solid var(--border); }
    .brand { display: flex; align-items: center; gap: 12px; margin-bottom: 30px; justify-content: center; }
    .brand-icon { width: 32px; height: 32px; background: var(--accent); color: white; border-radius: 6px; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 18px; }
    .brand-name { font-size: 18px; font-weight: 600; color: var(--text1); line-height: 1.2; }
    .brand-sub { font-size: 12px; color: var(--text3); }
    #login-error { color: var(--red); font-size: 13px; text-align: center; margin-bottom: 15px; display: none; }
    .fi { margin-bottom: 15px; }
    .btn { width: 100%; justify-content: center; padding: 10px; font-size: 14px; }
  </style>
</head>
<body>

<div class="login-box">
  <div class="brand">
    <div class="brand-icon">F</div>
    <div>
      <div class="brand-name">fi-tracker</div>
      <div class="brand-sub">Familieidræt</div>
    </div>
  </div>
  
  <div id="login-error"></div>
  
  <form id="login-form" onsubmit="handleLogin(event)">
    <div class="field">
      <label>Email</label>
      <input type="email" class="fi" id="email" required autofocus>
    </div>
    <div class="field">
      <label>Adgangskode</label>
      <input type="password" class="fi" id="password" required>
    </div>
    <button type="submit" class="btn">Log ind</button>
  </form>
</div>

<script>
let csrfToken = null;
async function initCsrf() {
  try {
    const res = await fetch('/api/csrf-token');
    const data = await res.json();
    csrfToken = data.csrf_token;
  } catch(e) { console.error('CSRF init failed', e); }
}

async function handleLogin(e) {
  e.preventDefault();
  const email = document.getElementById('email').value;
  const password = document.getElementById('password').value;
  const btn = e.target.querySelector('button');
  const err = document.getElementById('login-error');
  
  btn.disabled = true;
  btn.textContent = 'Logger ind...';
  err.style.display = 'none';
  
  try {
    const res = await fetch('/api/auth/login', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'X-CSRF-Token': csrfToken
      },
      body: JSON.stringify({ email, password })
    });
    
    if (res.ok) {
      window.location.href = '/';
    } else {
      const data = await res.json().catch(()=>({}));
      err.textContent = data.error || 'Fejl ved login';
      err.style.display = 'block';
      btn.disabled = false;
      btn.textContent = 'Log ind';
    }
  } catch(error) {
    err.textContent = 'Netværksfejl';
    err.style.display = 'block';
    btn.disabled = false;
    btn.textContent = 'Log ind';
  }
}

initCsrf();
</script>
</body>
</html>
